<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapGrok MCQ Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="slotList" class="slot-list" aria-label="Shortcut settings"></section>

      <div class="divider"></div>

      <footer class="footer">
        <div class="balance-card">
          <div>
            <span class="balance-label">Remaining Tokens:</span>
            <strong id="balanceValue">Loading…</strong>
          </div>
          <button id="refreshBalance" class="refresh-button" type="button" aria-label="Refresh remaining balance">↻</button>
        </div>

        <div class="app-controls">
          <span id="statusText" class="status-text">Extension active</span>
          <button id="pauseResume" class="pause-button" type="button">Pause extension</button>
          <span class="quit-label">Close app (Ctrl + Shift + Z)</span>
        </div>
      </footer>

      <div id="message" class="message" role="status"></div>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
