<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Name and Instruction</title>
    <link rel="stylesheet" href="editor.css" />
  </head>
  <body>
    <main>
      <h1>Name & instruction</h1>
      <p class="lead">This instruction is sent with the screenshot whenever the selected shortcut runs.</p>

      <label for="shortcutName">Shortcut name</label>
      <input id="shortcutName" maxlength="80" placeholder="Example: Solve math problem" />

      <label for="instruction">Detailed instruction</label>
      <textarea id="instruction" maxlength="12000" placeholder="Explain exactly what Grok should do with the screenshot."></textarea>

      <p class="note">The server also adds the calculated word limit. Do not paste an API key here.</p>

      <div class="actions">
        <button id="cancel" class="secondary" type="button">Cancel</button>
        <button id="save" class="primary" type="button">Save</button>
      </div>
      <div id="message" class="message" role="status"></div>
    </main>
    <script src="shared.js"></script>
    <script src="instruction.js"></script>
  </body>
</html>
