<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapGrok Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="header">
        <div>
          <h1>SnapGrok</h1>
          <p>Visible-tab screenshot → preset instruction → Grok response</p>
        </div>
        <span id="serverStatus" class="status-pill neutral">Checking server…</span>
      </header>

      <section id="slotList" class="slot-list" aria-label="Shortcut settings"></section>

      <div class="divider"></div>

      <section class="control-grid">
        <label class="toggle-card">
          <input id="deleteAfterUse" type="checkbox" />
          <span>
            <strong>Delete data after each case</strong>
            <small>When enabled, the local server does not retain screenshots or responses.</small>
          </span>
        </label>

        <button id="clearData" class="danger-button" type="button">Clear all retained data</button>

        <div class="server-row">
          <label for="serverUrl">Backend URL</label>
          <input id="serverUrl" type="url" value="http://127.0.0.1:8787" />
        </div>

        <div class="balance-card">
          <div>
            <strong>Remaining API credit</strong>
            <div id="balanceValue">Loading…</div>
            <small id="balanceNote"></small>
          </div>
          <button id="refreshBalance" class="small-button" type="button">Refresh</button>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-actions">
          <button id="saveAll" class="primary-button" type="button">Save all settings</button>
          <button id="pauseResume" class="secondary-button" type="button">Pause extension</button>
          <button id="manageShortcuts" class="secondary-button" type="button">Customize keys</button>
        </div>
        <div id="saveMessage" class="save-message" role="status"></div>
        <p class="footnote">
          Ctrl+Shift+Z pauses the extension on ordinary web pages. For a browser-level binding, assign
          Ctrl+Shift+Z to “Pause SnapGrok” in Chrome's shortcut page.
        </p>
      </footer>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
