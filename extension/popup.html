<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnipSage</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">SNIPSAGE PROTOTYPE</p>
      <h1>Ask from your screen</h1>
      <p class="description">Start a snip, select a visible region, then press Send.</p>
      <button id="startButton" type="button">Start snipping</button>
      <p class="shortcut">Shortcut: <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>Y</kbd></p>
      <p id="message" class="message" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
